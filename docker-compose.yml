services:
  db:
    image: postgres:16-alpine
    container_name: rfp-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rfp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rfp1234}
      POSTGRES_DB: ${POSTGRES_DB:-rfpdb}
    volumes:
      - rfp-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-rfp} -d $${POSTGRES_DB:-rfpdb}"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: rfp-ai
    ports:
      - "9000:9000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rfp}:${POSTGRES_PASSWORD:-rfp1234}@db:5432/${POSTGRES_DB:-rfpdb}
    volumes:
      - rfp-uploads:/app/uploads
      - rfp-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rfp-pgdata:
  rfp-uploads:
  rfp-data:
